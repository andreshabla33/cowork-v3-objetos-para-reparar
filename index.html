<!DOCTYPE html>
<html lang="en" style="background-color: #09090b;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cowork - Virtual Office</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <!-- Tailwind CSS: migrated from CDN to local PostCSS compilation (see styles/tailwind.css) -->
    <!-- The CSS is now imported via index.tsx and processed by Vite + PostCSS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Critical CSS — kept inline for fast first paint. Animations moved to tailwind.config.ts */
      body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; background-color: #09090b; color: #fff; }
      * { scrollbar-width: thin; }
      canvas { image-rendering: pixelated; }

      /* Camera mirror fix: prevents pixel splitting on Y-axis rotation */
      .mirror {
        transform: scaleX(-1);
        -webkit-transform: scaleX(-1);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        transform-style: preserve-3d;
        image-rendering: auto;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.4); border-radius: 10px; }
    </style>
  <!-- Import map: pinned to exact versions to mitigate supply chain risk -->
  <!-- NOTE: In production, Vite bundles all deps from node_modules. -->
  <!-- These maps serve as dev fallback. Consider removing once build pipeline is stable. -->
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@19.2.3/",
    "react/": "https://esm.sh/react@19.2.3/",
    "react": "https://esm.sh/react@19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "zustand": "https://esm.sh/zustand@5.0.9",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.47.10",
    "phaser": "https://esm.sh/phaser@3.80.1"
  }
}
</script>
</head>
  <body>
    <div id="root" style="background-color: #09090b; min-height: 100vh;"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
